<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mockup — Posteo Mirada Digital</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Space Grotesk', sans-serif;
      padding: 24px;
      gap: 16px;
    }
    .label {
      color: #555;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .post {
      position: relative;
      width: 100%;
      max-width: 420px;
      aspect-ratio: 1 / 1;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0,0,0,0.8);
    }

    /* Fondo: foto simulada con gradiente realista tipo oficina oscura */
    .bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 70% 30%, rgba(30,50,80,0.6) 0%, transparent 60%),
        radial-gradient(ellipse at 20% 80%, rgba(0,212,255,0.08) 0%, transparent 50%),
        linear-gradient(135deg, #0a0e14 0%, #0d1b2a 40%, #0a1520 70%, #060a0f 100%);
    }

    /* Simulación de pantalla de laptop con datos */
    .screen {
      position: absolute;
      top: 12%;
      right: 8%;
      width: 38%;
      height: 30%;
      background: #0d1b2a;
      border-radius: 4px;
      border: 1px solid rgba(0,212,255,0.2);
      overflow: hidden;
      opacity: 0.7;
    }
    .screen-bar {
      height: 6px;
      background: linear-gradient(90deg, #00D4FF 0%, #00E676 60%, transparent 100%);
      opacity: 0.8;
    }
    .screen-line {
      height: 3px;
      margin: 6px 8px 0;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
    }
    .screen-line.short { width: 55%; }
    .screen-line.accent { background: rgba(0,212,255,0.3); width: 70%; }
    .screen-graph {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      padding: 8px 8px 4px;
      height: 50px;
    }
    .bar {
      flex: 1;
      border-radius: 2px 2px 0 0;
      background: rgba(0,212,255,0.25);
    }
    .bar.high { background: rgba(0,230,118,0.5); }

    /* Overlay oscuro sobre todo */
    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        160deg,
        rgba(0,0,0,0.55) 0%,
        rgba(0,0,0,0.45) 40%,
        rgba(0,0,0,0.7) 100%
      );
    }

    /* Grano/textura */
    .grain {
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 150px;
    }

    /* Texto */
    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 10% 9%;
    }
    .eyebrow {
      font-size: clamp(8px, 2vw, 11px);
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #00D4FF;
      margin-bottom: 5%;
      opacity: 0.8;
    }
    .headline {
      font-size: clamp(18px, 5.5vw, 28px);
      font-weight: 800;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 6%;
    }
    .headline em {
      font-style: normal;
      color: #00D4FF;
    }
    .body-text {
      font-size: clamp(11px, 3vw, 15px);
      font-weight: 400;
      color: rgba(255,255,255,0.75);
      line-height: 1.55;
      border-left: 2px solid #00E676;
      padding-left: 5%;
    }
    .handle {
      position: absolute;
      bottom: 6%;
      left: 9%;
      font-size: clamp(8px, 2vw, 11px);
      letter-spacing: 1px;
      color: rgba(255,255,255,0.3);
      font-weight: 400;
    }
    .dot {
      display: inline-block;
      width: 5px;
      height: 5px;
      background: #00D4FF;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
      margin-bottom: 1px;
    }
  </style>
</head>
<body>
  <p class="label">Mockup — Feed Instagram</p>

  <div class="post">
    <div class="bg"></div>
    <div class="screen">
      <div class="screen-bar"></div>
      <div class="screen-line accent"></div>
      <div class="screen-line short"></div>
      <div class="screen-line"></div>
      <div class="screen-graph">
        <div class="bar" style="height:30%"></div>
        <div class="bar" style="height:50%"></div>
        <div class="bar" style="height:40%"></div>
        <div class="bar high" style="height:80%"></div>
        <div class="bar" style="height:55%"></div>
        <div class="bar high" style="height:95%"></div>
        <div class="bar" style="height:60%"></div>
      </div>
    </div>
    <div class="overlay"></div>
    <div class="grain"></div>
    <div class="content">
      <p class="eyebrow">Mirada Digital</p>
      <h1 class="headline">
        La mayoría de las agencias<br>
        cobran por hacer clic<br>
        en "publicar".<br><br>
        Nosotros cobramos<br>
        por <em>resultados</em>.
      </h1>
      <p class="body-text">
        Si no crecés, hay algo que<br>
        no está funcionando —<br>
        y te lo decimos de frente.
      </p>
    </div>
    <div class="handle"><span class="dot"></span>@somosmiradadigital</div>
  </div>

  <p class="label" style="margin-top:8px;">exportá como captura de pantalla</p>
</body>
</html>
