<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mockup — Posteo Mirada Digital</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Space Grotesk', sans-serif;
      padding: 24px;
      gap: 12px;
    }
    .label {
      color: #444;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .post {
      position: relative;
      width: 100%;
      max-width: 420px;
      aspect-ratio: 1 / 1;
      border-radius: 3px;
      overflow: hidden;
      box-shadow: 0 20px 80px rgba(0,0,0,0.9);
    }

    /* Foto real de fondo */
    .photo {
      position: absolute;
      inset: 0;
      background-image: url('https://images.unsplash.com/photo-1504868584819-f8e8b4b6d7e3?w=800&q=80');
      background-size: cover;
      background-position: center;
      filter: brightness(0.45) contrast(1.1) saturate(0.7);
    }

    /* Overlay degradado direccional */
    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.2) 0%,
        rgba(0,0,0,0.1) 30%,
        rgba(0,0,0,0.65) 70%,
        rgba(0,0,0,0.85) 100%
      );
    }

    /* Línea de acento lateral */
    .accent-line {
      position: absolute;
      left: 9%;
      top: 18%;
      bottom: 18%;
      width: 2px;
      background: linear-gradient(to bottom, transparent, #00D4FF 30%, #00E676 70%, transparent);
      opacity: 0.7;
    }

    /* Contenido */
    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 8% 9% 10%;
    }

    .tag {
      font-size: clamp(9px, 2.2vw, 12px);
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #00D4FF;
      margin-bottom: 4%;
      font-weight: 500;
    }

    .headline {
      font-size: clamp(17px, 5.2vw, 26px);
      font-weight: 800;
      color: #fff;
      line-height: 1.25;
      margin-bottom: 5%;
      text-shadow: 0 2px 20px rgba(0,0,0,0.5);
    }

    .headline .highlight {
      color: #00D4FF;
    }

    .subtext {
      font-size: clamp(10px, 2.8vw, 14px);
      font-weight: 400;
      color: rgba(255,255,255,0.6);
      line-height: 1.6;
      margin-bottom: 6%;
    }

    .handle {
      font-size: clamp(9px, 2vw, 11px);
      letter-spacing: 1px;
      color: rgba(255,255,255,0.35);
      font-weight: 500;
    }

    .handle span {
      color: #00D4FF;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <p class="label">Feed Instagram — 1080×1080</p>

  <div class="post">
    <div class="photo"></div>
    <div class="overlay"></div>
    <div class="accent-line"></div>
    <div class="content">
      <p class="tag">Mirada Digital</p>
      <h1 class="headline">
        La mayoría de las agencias<br>
        cobran por hacer clic<br>
        en "publicar".<br><br>
        Nosotros cobramos<br>
        por <span class="highlight">resultados</span>.
      </h1>
      <p class="subtext">
        Si no crecés, hay algo que no está funcionando<br>
        — y te lo decimos de frente.
      </p>
      <p class="handle"><span>@</span>somosmiradadigital</p>
    </div>
  </div>

  <p class="label" style="margin-top:6px;">tomá captura para compartir</p>

</body>
</html>
