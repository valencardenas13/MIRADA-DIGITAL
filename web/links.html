<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mirada Digital</title>
  <meta name="description" content="Agencia de performance digital. Invertís. Te mostramos qué pasa con cada peso.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Space Grotesk', Arial, sans-serif;
      background: #0D1B2A;
      color: #FFFFFF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    /* LOGO */
    .logo { margin-bottom: 8px; }
    .logo svg { width: 52px; height: 52px; }

    /* NAME */
    .name {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 2px;
      text-align: center;
    }

    .handle {
      font-size: 14px;
      color: #8892A4;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .tagline {
      font-size: 14px;
      color: #8892A4;
      text-align: center;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    /* BUTTONS */
    .btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 18px 24px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: transform 0.15s, opacity 0.15s;
      letter-spacing: 0.3px;
    }
    .btn:hover { transform: translateY(-2px); opacity: 0.9; }
    .btn:active { transform: translateY(0); }

    .btn-web {
      background: rgba(0,212,255,0.08);
      border: 1px solid rgba(0,212,255,0.25);
      color: #FFFFFF;
    }

    .btn-wa {
      background: #25D366;
      color: #FFFFFF;
    }

    .btn-mail {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      color: #FFFFFF;
    }

    .btn-ig {
      background: linear-gradient(135deg, rgba(131,58,180,0.3), rgba(253,29,29,0.3), rgba(252,176,69,0.3));
      border: 1px solid rgba(255,255,255,0.1);
      color: #FFFFFF;
    }

    .btn-icon { width: 22px; flex-shrink: 0; }

    /* DIVIDER */
    .sep {
      width: 100%;
      height: 1px;
      background: rgba(0,212,255,0.08);
      margin: 4px 0;
    }

    /* FOOTER */
    .footer {
      margin-top: 16px;
      font-size: 12px;
      color: rgba(136,146,164,0.5);
      letter-spacing: 2px;
    }
  </style>
</head>
